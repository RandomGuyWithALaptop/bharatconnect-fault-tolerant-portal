<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatConnect - SDE Architecture Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-6 flex flex-col items-center justify-center space-y-6">

    <div class="text-center max-w-2xl">
        <h1 class="text-3xl font-extrabold tracking-wide text-blue-400">BharatConnect Core Engine</h1>
        <p class="text-slate-400 mt-1">Distributed Network Resilience & Congestion Load Simulation Lab</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl w-full">
        
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6 space-y-6 flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-bold text-slate-200 border-b border-slate-700 pb-2">1. Manual Target Portal</h2>
                <div class="space-y-4 mt-4">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">BSNL Number</label>
                        <input id="mobileInput" type="tel" maxlength="10" placeholder="e.g., 9440012345" value="9440012345"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-lg font-mono text-white tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Select Plan</label>
                        <div id="plan199" onclick="selectPlan('199')" class="bg-slate-950 p-3 rounded-xl border border-blue-500 cursor-pointer flex justify-between items-center">
                            <div><span class="text-md font-bold text-white">₹199 Plan</span><p class="text-xs text-slate-400">2GB/Day Data</p></div>
                            <div class="h-4 w-4 rounded-full bg-blue-500"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <div id="statusBox" class="hidden text-xs p-3 rounded-xl font-mono"></div>
                <button id="submitBtn" onclick="processRecharge()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-all active:scale-[0.99]">
                    Execute Isolated Transaction
                </button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6 space-y-6">
            <h2 class="text-lg font-bold text-slate-200 border-b border-slate-700 pb-2">2. Distributed Load Simulator</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="runLoadSimulation(false)" class="bg-red-700 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-xl text-xs transition-all">
                    Spawn 500 Clients<br><span class="font-normal opacity-80">(No Backoff/Synchronized)</span>
                </button>
                <button onclick="runLoadSimulation(true)" class="bg-emerald-700 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-xl text-xs transition-all">
                    Spawn 500 Clients<br><span class="font-normal opacity-80">(With Exponential Jitter)</span>
                </button>
            </div>

            <div class="bg-slate-950 rounded-xl p-4 space-y-4 border border-slate-800 font-mono text-sm">
                <div class="flex justify-between items-center"><span class="text-slate-400">Gateway Hits:</span><span id="mTotal" class="text-white font-bold">0</span></div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="barTotal" class="bg-blue-500 h-full transition-all duration-300" style="width: 0%"></div></div>
                
                <div class="flex justify-between items-center"><span class="text-emerald-400">Successful Clears:</span><span id="mSuccess" class="text-emerald-400 font-bold">0</span></div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="barSuccess" class="bg-emerald-500 h-full transition-all duration-300" style="width: 0%"></div></div>

                <div class="flex justify-between items-center"><span class="text-red-400">Dropped Packets (504):</span><span id="mDropped" class="text-red-400 font-bold">0</span></div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="barDropped" class="bg-red-500 h-full transition-all duration-300" style="width: 0%"></div></div>
            </div>

            <div class="text-center">
                <button onclick="resetMetricsFromServer()" class="text-xs text-slate-500 hover:text-slate-400 underline">Clear Server Metrics Log</button>
            </div>
        </div>

    </div>

    <script>
        const BACKEND_URL = "";
        let selectedPlanId = "199";
        
        function selectPlan(id) { selectedPlanId = id; }

        function showStatus(text, classes) {
            const el = document.getElementById('statusBox');
            el.classList.remove('hidden');
            el.className = "text-xs p-3 rounded-xl font-mono " + classes;
            el.innerText = text;
        }

        // --- MANAGE ISOLATED TRANSACTION ---
        async function processRecharge() {
            const num = document.getElementById('mobileInput').value.trim();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Transmitting Packet...";
            
            await executeSingleCall(num, btn, 1);
        }

        async function executeSingleCall(num, btn, attempt) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/recharge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: num, planId: selectedPlanId })
                });
                
                if (res.status === 200) {
                    btn.disabled = false;
                    btn.innerText = "Execute Isolated Transaction";
                    showStatus("✅ Transaction Successfully Routed!", "bg-emerald-950 text-emerald-400 border border-emerald-800");
                    updateMetricsDisplay();
                } else {
                    throw new Error("504 Drop");
                }
            } catch (err) {
                if (attempt <= 3) {
                    const baseDelay = 1000 * Math.pow(2, attempt - 1);
                    const jitter = Math.floor(Math.random() * 400);
                    const totalDelay = baseDelay + jitter;
                    
                    showStatus(`⚠️ Drop! Backoff algorithm stalling for ${totalDelay}ms...`, "bg-amber-950 text-amber-400 border border-amber-800");
                    btn.innerText = `Retrying (#${attempt})...`;
                    
                    setTimeout(() => { executeSingleCall(num, btn, attempt + 1); }, totalDelay);
                } else {
                    btn.disabled = false;
                    btn.innerText = "Execute Isolated Transaction";
                    showStatus("❌ Connection Blocked after 3 Exhausted Retries.", "bg-red-950 text-red-400 border border-red-800");
                    updateMetricsDisplay();
                }
            }
        }

        // --- NEW: SYSTEM LOAD SIMULATOR ENGINE ---
        async function runLoadSimulation(useSmartBackoff) {
            // 1. Reset metrics before running load
            await fetch(`${BACKEND_URL}/api/reset`, { method: 'POST' });
            updateMetricsDisplay();

            // 2. Launch 500 virtual device connections concurrently
            for (let i = 0; i < 500; i++) {
                simulateVirtualClient(`SimDevice-${1000 + i}`, useSmartBackoff, 1);
            }
        }

        async function simulateVirtualClient(deviceId, useSmartBackoff, attempt) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/recharge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: deviceId, planId: "199" })
                });

                if (res.status === 200) {
                    updateMetricsDisplay();
                } else {
                    throw new Error("504");
                }
            } catch (err) {
                if (attempt <= 3) {
                    let delay = 1000; // Default flat fallback delay
                    
                    if (useSmartBackoff) {
                        // Apply active SDE Backoff + Jitter Formula
                        delay = (1000 * Math.pow(2, attempt - 1)) + Math.floor(Math.random() * 400);
                    }

                    setTimeout(() => {
                        simulateVirtualClient(deviceId, useSmartBackoff, attempt + 1);
                    }, delay);
                } else {
                    updateMetricsDisplay();
                }
            }
        }

        // --- RENDER REAL-TIME METRICS UPGRADES ---
        async function updateMetricsDisplay() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/metrics`);
                const data = await res.json();
                
                document.getElementById('mTotal').innerText = data.totalRequests;
                document.getElementById('mSuccess').innerText = data.successfulRequests;
                document.getElementById('mDropped').innerText = data.droppedRequests;

                // Scale maximum layout visibility bar dynamically
                const max = Math.max(data.totalRequests, 1);
                document.getElementById('barTotal').style.width = `100%`;
                document.getElementById('barSuccess').style.width = `${(data.successfulRequests / max) * 100}%`;
                document.getElementById('barDropped').style.width = `${(data.droppedRequests / max) * 100}%`;
            } catch (e) {}
        }

        async function resetMetricsFromServer() {
            await fetch(`${BACKEND_URL}/api/reset`, { method: 'POST' });
            updateMetricsDisplay();
        }

        // Poll metrics updates every half-second automatically
        setInterval(updateMetricsDisplay, 500);
    </script>
</body>
</html>
